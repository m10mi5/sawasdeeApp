name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: prod-build
          path: dist

      - run: npx vite build --base /sawasdeeApp/dev/

      - uses: actions/upload-artifact@v4
        with:
          name: dev-build
          path: dist

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: sawasdeeapp-dev
      url: https://m10mi5.github.io/sawasdeeApp/dev/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dev-build
          path: dev-dist

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dev-dist
          destination_dir: dev

  deploy-prod:
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://m10mi5.github.io/sawasdeeApp/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: prod-build
          path: site

      - uses: actions/download-artifact@v4
        with:
          name: dev-build
          path: site/dev

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      - id: deployment
        uses: actions/deploy-pages@v4
