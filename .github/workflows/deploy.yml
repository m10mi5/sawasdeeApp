name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run ci

      - name: Build with correct base path
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            npx vite build --base /sawasdeeApp/dev/
          else
            npx vite build
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref_name == 'dev'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          keep_files: true

      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref_name == 'main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
