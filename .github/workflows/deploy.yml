name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: main-src/package-lock.json

      - name: Build prod from main
        working-directory: main-src
        run: npm ci && npm run ci && npm run build

      - name: Build dev from dev branch
        working-directory: dev-src
        run: npm ci && npx vite build --base /sawasdeeApp/dev/

      - name: Combine into one site
        run: |
          mkdir -p site
          cp -r main-src/dist/* site/
          mkdir -p site/dev
          cp -r dev-src/dist/* site/dev/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
